server {
    listen 80;
    server_name your-domain.com;  # 替换为你的域名

    root /var/www/aigc-tutorial;  # 替换为实际部署路径
    index index.html;

    # gzip 压缩
    gzip on;
    gzip_types text/html text/css application/javascript;
    gzip_min_length 256;

    # 静态资源缓存
    location ~* \.(css|js|pdf|png|jpg|svg|ico)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
